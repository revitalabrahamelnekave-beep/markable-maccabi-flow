<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>MARKABLE x מכבי - מסע המטופלת</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --pk:#D1409C;--pk-deep:#B22F84;--navy:#1a1a2e;--muted:#5c5c6e;
  --bg:#f2f2f7;--card:#fff;--green:#1A7A3B;--blue:#2E6BE6;--amber:#B8860B;--orange:#C4622D;--red:#C0392B;
  --line:#ececf0;--wash:#faf5f9;--font:'Heebo',-apple-system,system-ui,Segoe UI,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#14141c;font-family:var(--font)}
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#2d1b3d,#1a1a2e)}
.phone{width:390px;height:844px;max-height:calc(100vh - 24px);max-width:calc(100vw - 24px);background:#000;border-radius:50px;position:relative;box-shadow:0 0 0 3px #333,0 0 0 6px #14141c,0 24px 80px rgba(0,0,0,.6);overflow:hidden;display:flex;flex-direction:column}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:120px;height:33px;background:#000;border-radius:18px;z-index:100}
.badge{position:fixed;top:16px;right:16px;z-index:400;background:var(--pk);color:#fff;font-size:10px;font-weight:800;padding:4px 12px;border-radius:8px;letter-spacing:1.5px}
.screenwrap{flex:1;background:var(--bg);border-radius:46px;overflow:hidden;display:flex;flex-direction:column;position:relative}
.statusbar{height:52px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 30px 6px;font-size:14px;font-weight:700;color:#000;background:#fff;flex-shrink:0;z-index:50}
.statusbar.dark{background:#000;color:#fff}
.sicons{display:flex;gap:5px;align-items:center}
.progress{height:2px;background:#eee;flex-shrink:0}
.progress .fill{height:100%;background:var(--pk);width:0;transition:width .4s}
.progress.hide{display:none}
.content{flex:1;position:relative;overflow:hidden}
.scr{position:absolute;inset:0;opacity:0;pointer-events:none;transform:translateX(-26px);transition:opacity .35s,transform .35s;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;direction:rtl}
.scr.active{opacity:1;pointer-events:auto;transform:none}
.scr.exit{opacity:0;transform:translateX(26px)}
.pad{padding:18px 20px}
.foot{margin-top:auto;padding:14px 20px 18px;flex-shrink:0}
.homebar{height:26px;display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0}
.homebar .h{width:130px;height:5px;border-radius:3px;background:#000;opacity:.18}
.powered{background:#f7f7f9;padding:6px;text-align:center;font-size:9px;color:#8a8a94;letter-spacing:.5px;flex-shrink:0;direction:ltr}
.powered img{height:12px;vertical-align:middle;margin-right:4px;opacity:.85}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 18px;border-radius:14px;font-family:var(--font);font-size:15px;font-weight:700;border:none;cursor:pointer;transition:transform .12s}
.btn:active{transform:scale(.98)}
.btn-pk{background:var(--pk);color:#fff;box-shadow:0 8px 22px rgba(209,64,156,.26)}
.btn-out{background:#fff;color:var(--pk);border:1.5px solid var(--pk)}
.btn:disabled{opacity:.4;cursor:default}

h2.t{font-size:22px;font-weight:800;color:var(--navy);line-height:1.22}
.ey{font-size:10.5px;font-weight:800;letter-spacing:.06em;color:var(--pk);margin-bottom:6px}
.sub{font-size:14px;color:var(--muted);line-height:1.6}
.disc{font-size:10px;color:#a7a7b0;line-height:1.45;text-align:center;margin-top:8px}

/* lock / SMS */
.lock{background:linear-gradient(180deg,#c8d3ef,#dfe0e6);padding:64px 22px 30px;text-align:center;min-height:100%}
.lock .time{font-size:70px;font-weight:200;color:#12121a;letter-spacing:-2px}
.lock .date{font-size:16px;color:#2a2a34;margin-bottom:44px}
.notif{background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-radius:20px;padding:14px 15px;text-align:right;box-shadow:0 6px 22px rgba(0,0,0,.12);cursor:pointer;transition:transform .15s}
.notif:active{transform:scale(.98)}
.notif .nh{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.notif .ic{width:26px;height:26px;border-radius:7px;background:#00A651;display:flex;align-items:center;justify-content:center}
.notif .nm{font-size:12px;font-weight:700;color:#333}
.notif .nt{font-size:11px;color:#888;margin-inline-start:auto}
.notif .nb{font-size:14px;color:#111;line-height:1.55}
.notif .nb b{color:var(--pk-deep)}
.taphint{margin-top:22px;font-size:11px;color:#3a3a46;opacity:.75}

/* steps */
.steps{background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px 14px;margin:12px 0}
.stp{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #f2f2f5}
.stp:last-child{border-bottom:none}
.stp .n{flex:none;width:26px;height:26px;border-radius:8px;background:var(--wash);color:var(--pk);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
.stp h4{font-size:14px;font-weight:700;color:var(--navy)}
.stp p{font-size:11.5px;color:var(--muted);line-height:1.45}
.stages{display:flex;gap:8px;margin:12px 0 8px}
.stage-box{flex:1;border-radius:11px;padding:9px 11px}
.stage-box.now{background:rgba(209,64,156,.05);border:1px solid rgba(209,64,156,.14)}
.stage-box.later{background:#fafafa;border:1px solid var(--line)}
.stage-box .sl{font-size:10px;font-weight:800}
.stage-box.now .sl{color:var(--pk)}
.stage-box.later .sl{color:#999}
.stage-box .sd{font-size:10.5px;color:var(--muted);line-height:1.35;margin-top:2px}

/* consent */
.cItem{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #f2f2f5;cursor:pointer}
.cItem:last-child{border-bottom:none}
.cbox{width:20px;height:20px;border-radius:6px;border:2px solid #d5d5dd;flex:none;display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:1px}
.cbox.on{background:var(--pk);border-color:var(--pk)}
.cbox.on::after{content:"";width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.cItem .ct{font-size:12px;color:#444;line-height:1.5}
.tagr{font-size:9px;font-weight:800;padding:1px 6px;border-radius:4px;background:var(--wash);color:var(--pk);margin-inline-start:4px}
.tago{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:#f0f0f3;color:#999;margin-inline-start:4px}

/* questionnaire */
.q h4{font-size:13px;font-weight:700;color:var(--navy);margin:14px 0 7px}
.qrow{display:flex;gap:8px}
.qopt{flex:1;padding:11px;border-radius:11px;border:2px solid #eee;font-size:13px;font-weight:600;color:#444;text-align:center;cursor:pointer;transition:.15s}
.qopt.sel{border-color:var(--pk);background:var(--wash);color:var(--pk)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 12px;border-radius:16px;border:2px solid #eee;font-size:12px;font-weight:600;color:#555;cursor:pointer;transition:.15s}
.chip.sel{border-color:var(--pk);background:var(--wash);color:var(--pk)}
.inp{width:110px;padding:10px 12px;border-radius:10px;border:2px solid #eee;font-size:15px;font-weight:700;font-family:var(--font);text-align:center}
.rf-note{display:none;margin-top:10px;background:#fff4e0;border:1px solid #f1d3a1;border-radius:10px;padding:9px 12px;font-size:11px;color:#8a6100;line-height:1.5}

/* scan */
.scanfull{background:#000;height:100%;position:relative}
.scanfull video{width:100%;height:100%;object-fit:cover}

/* analyzing */
.analyz{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#fff;text-align:center;padding:30px}
.spin{width:52px;height:52px;border:4px solid #f0e3ee;border-top-color:var(--pk);border-radius:50%;animation:sp 1s linear infinite;margin-bottom:20px}
@keyframes sp{to{transform:rotate(360deg)}}

/* category gauge (no numbers) */
.catwrap{text-align:center;margin:16px 0 6px}
.catpill{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:800;padding:8px 16px;border-radius:20px}
.catpill::before{content:'';width:9px;height:9px;border-radius:50%;background:currentColor}
.catgauge{display:flex;gap:5px;max-width:230px;margin:12px auto 0}
.catseg{flex:1;height:7px;border-radius:4px;background:#e9e9ee}
.rows{background:#fff;border:1px solid var(--line);border-radius:14px;padding:4px 14px;margin-top:4px}
.row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f2f2f5}
.row:last-child{border-bottom:none}
.row .rn{font-size:13px;color:#333;font-weight:600}
.row .rl{font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:7px}
.row .rl::before{content:'';width:8px;height:8px;border-radius:50%;background:currentColor}

/* summary */
.mini{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:9px}
.mini .mi{width:40px;height:40px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px}
.mini .ml{flex:1}
.mini h4{font-size:14px;font-weight:700;color:var(--navy)}
.mini p{font-size:11px;color:var(--muted)}
.mtag{font-size:11px;font-weight:800;padding:4px 11px;border-radius:12px;white-space:nowrap}
.legend{background:#fafafb;border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin:10px 0 14px}
.legend .li{display:flex;align-items:center;gap:9px;font-size:11.5px;color:#555;line-height:1.5}
.legend .li+.li{margin-top:5px}
.legend .d{width:10px;height:10px;border-radius:50%;flex:none}

/* tools */
.toolgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.tool{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 12px}
.tool .ti{width:32px;height:32px;border-radius:9px;background:var(--wash);display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.tool h4{font-size:13px;font-weight:700;color:var(--navy)}
.tool p{font-size:10.5px;color:var(--muted);line-height:1.4;margin-top:2px}
.tool .ev{font-size:8.5px;font-weight:800;color:var(--pk);letter-spacing:.02em;margin-top:6px}

/* report */
.repcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.rephead{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--navy);padding-bottom:9px;margin-bottom:11px}
.repbrand{display:flex;align-items:center;gap:7px;font-weight:800;font-size:13px}
.repbrand .m1{color:#003B7B}.repbrand .m2{color:var(--pk)}
.repsec{font-size:10px;font-weight:800;letter-spacing:.04em;color:var(--navy);margin:13px 0 4px;padding-top:9px;border-top:1px solid #f0f0f3}
.repchips{display:flex;gap:6px;flex-wrap:wrap}
.repchip{font-size:11px;font-weight:700;padding:5px 11px;border-radius:14px}

/* close */
.done{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:36px 26px;background:linear-gradient(180deg,#fff,var(--wash))}
.done .ic{width:74px;height:74px;border-radius:20px;background:#fff;box-shadow:0 10px 30px rgba(209,64,156,.18);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.appt{background:rgba(46,107,230,.06);border:1px solid rgba(46,107,230,.14);border-radius:12px;padding:13px 16px;font-size:13px;color:#333;line-height:1.55;margin-top:16px}

/* nav */
.nav{position:fixed;right:calc(50% - 250px);top:50%;transform:translate(100%,-50%);margin-right:-24px;z-index:300;display:flex;flex-direction:column;gap:10px;width:184px;direction:rtl}
.nav .h{font-size:11px;font-weight:800;color:#e6a9d3;text-align:center;letter-spacing:.03em}
.nav .arrows{display:flex;flex-direction:column;gap:6px}
.nav .a{display:flex;align-items:center;gap:9px;padding:11px 15px;border-radius:11px;background:#fff;border:1.5px solid #2a2a38;cursor:pointer;transition:.15s}
.nav .a:hover{border-color:var(--pk)}
.nav .a svg{width:16px;height:16px}
.nav .a span{font-size:12px;font-weight:700;color:#444}
.nav .jump{background:#fff;border-radius:12px;padding:8px 6px;max-height:460px;overflow-y:auto}
.nav .j{font-size:11px;color:#666;padding:6px 10px;border-radius:8px;cursor:pointer;font-weight:600;text-align:right}
.nav .j:hover{background:var(--wash);color:var(--pk)}
.nav .j.on{background:var(--wash);color:var(--pk);font-weight:800}
.nav .back{font-size:11px;color:#c9c9d6;text-align:center;padding:8px;cursor:pointer;text-decoration:none;display:block}
.srow{display:flex;align-items:center;gap:8px;padding:10px 2px;border-bottom:1px solid #f2f2f5}
.srow:last-child{border-bottom:none}
.srow .sn{font-size:13px;font-weight:600;color:#333;flex:1;min-width:0}
.srow .sanchor{font-size:10.5px;color:#aaa;white-space:nowrap}
.stepper{display:flex;align-items:center;gap:7px}
.stepper button{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-size:15px;font-weight:800;color:var(--pk);cursor:pointer;line-height:1;padding:0}
.stepper span{width:18px;text-align:center;font-size:14px;font-weight:800}
.sdir{font-size:11px;font-weight:800;width:52px;text-align:left;white-space:nowrap}
.sst{display:flex;align-items:center;gap:9px;font-size:13.5px;color:#999;padding:8px 0;border-bottom:1px solid #f4f4f6}
.sst:last-child{border-bottom:none}
.sst .dot{width:20px;text-align:center;font-weight:800;color:#ccc}
.sst.done{color:#1a1a2e;font-weight:600}
.sst.done .dot{color:#0a7c42}
.donetopic{font-size:13px;color:#444;padding:3px 0}
.remcard{display:flex;align-items:flex-start;gap:11px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.remcard .ri{width:34px;height:34px;border-radius:10px;background:var(--wash);display:flex;align-items:center;justify-content:center;flex:none}
.remcard .rc{flex:1;min-width:0}
.remcard h4{font-size:13.5px;font-weight:700;color:var(--navy)}
.remcard .rd{font-size:12px;color:var(--pk);font-weight:600;margin-top:1px}
.remcard .rn{font-size:10.5px;color:#999;line-height:1.4;margin-top:3px}
.rtoggle{width:40px;height:23px;border-radius:12px;background:#1A7A3B;position:relative;cursor:pointer;flex:none;transition:.2s;margin-top:3px}
.rtoggle::after{content:'';position:absolute;width:19px;height:19px;border-radius:50%;background:#fff;top:2px;right:2px;transition:.2s}
.rtoggle.off{background:#ccc}
.rtoggle.off::after{right:19px}
@media(max-width:1180px){.nav{display:none}}
@media(max-width:440px){.phone{width:100%;height:100%;max-width:100vw;max-height:100vh;border-radius:0}.screenwrap{border-radius:0}.island{display:none}.badge{display:none}}
</style>
</head>
<body>
<div class="stage">
  <div class="phone">
    <div class="badge">DEMO</div>
    <div class="island"></div>
    <div class="screenwrap">
      <div class="statusbar" id="sbar">
        <div>9:41</div>
        <div class="sicons">
          <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="6" width="3" height="5" rx="1" fill="currentColor"/><rect x="4.5" y="4" width="3" height="7" rx="1" fill="currentColor"/><rect x="9" y="2" width="3" height="9" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="11" rx="1" fill="currentColor" opacity=".35"/></svg>
          <svg width="24" height="11" viewBox="0 0 24 11"><rect x="0" y="1" width="20" height="9" rx="2.5" stroke="currentColor" fill="none"/><rect x="1.5" y="2.5" width="15" height="6" rx="1.5" fill="currentColor"/><rect x="21" y="4" width="2" height="3.5" rx="1" fill="currentColor" opacity=".5"/></svg>
        </div>
      </div>
      <div class="progress" id="prog"><div class="fill" id="fill"></div></div>
      <div class="content" id="content"></div>
      <div class="powered">POWERED BY <img src="markable-logo.png" alt="MARKABLE"></div>
      <div class="homebar"><div class="h"></div></div>
    </div>
  </div>
</div>

<div class="nav" id="nav">
  <div class="h">ניווט בדמו</div>
  <div class="arrows">
    <div class="a" onclick="prev()"><svg viewBox="0 0 24 24" fill="none" stroke="#D1409C" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg><span>הקודם</span></div>
    <div class="a" onclick="next()"><svg viewBox="0 0 24 24" fill="none" stroke="#D1409C" stroke-width="2.5"><path d="M15 6l-6 6 6 6"/></svg><span>הבא</span></div>
  </div>
  <div class="jump" id="jump"></div>
  <a href="index.html" class="back">חזרה לתפריט</a>
</div>

<script>
var CLINIC = "מכבי · שירות גיל המעבר";
var CLINICIAN = "ד\"ר רונית כהן";
var NAME = "מיכל";

var SCREENS = [
  {id:"lock", label:"SMS ממכבי", noprog:true},
  {id:"landing", label:"לפני הביקור"},
  {id:"consent", label:"הסכמה"},
  {id:"scanintro", label:"סריקת פנים"},
  {id:"scan", label:"סריקה", noprog:true},
  {id:"quest", label:"כמה שאלות"},
  {id:"analyzing", label:"מעבדים", noprog:true},
  {id:"imprint", label:"החותם ההורמונלי"},
  {id:"symptoms", label:"מיפוי תסמינים"},
  {id:"think", label:"THINK, קוגניציה"},
  {id:"sense", label:"SENSE, חושים"},
  {id:"summary", label:"הפרופיל שלך"},
  {id:"report", label:"לרופאה"},
  {id:"tools", label:"בין הביקורים"},
  {id:"reminders", label:"התזכורות שלך"},
  {id:"done", label:"מוכנה לביקור", noprog:true},
  {id:"sereport", label:"עדכון לצוות", noprog:true},
  {id:"sereassure", label:"הקשר", noprog:true},
  {id:"sestatus", label:"נשלח לצוות", noprog:true}
];
var cur = 0;

// One consistent progress scale (change since the previous mapping): 0 משתפר / 1 יציב / 2 לא השתנה
var TR = [
  {label:"משתפר",     color:"#1A7A3B"},
  {label:"יציב",      color:"#2E6BE6"},
  {label:"לא השתנה",  color:"#B8860B"}
];
function catPill(t){var v=TR[t];return '<div class="catwrap"><span class="catpill" style="background:'+v.color+'14;color:'+v.color+'">'+v.label+'</span></div>';}
function rowsHtml(items){var h='<div class="rows">';items.forEach(function(it){var v=TR[it.t];h+='<div class="row"><span class="rn">'+it.n+'</span><span class="rl" style="color:'+v.color+'">'+v.label+'</span></div>';});return h+'</div>';}
var ICON={
  imprint:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D1409C" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M8.5 15a4 4 0 007 0"/><path d="M8.5 10h.01M15.5 10h.01"/></svg>',
  symptoms:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D1409C" stroke-width="1.8"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>',
  think:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D1409C" stroke-width="1.8"><path d="M9 3a4 4 0 00-4 4 3 3 0 00-1 5 3 3 0 002 5 3 3 0 006 0V5a2 2 0 00-2-2z"/><path d="M15 7a2 2 0 012 2 3 3 0 011 5"/></svg>',
  sense:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D1409C" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>'
};

// Symptom re-rating with the previous-visit value pre-filled as an anchor
var SYM=[
  {n:"גלי חום",prev:8,now:3},
  {n:"הזעות לילה",prev:7,now:3},
  {n:"רגישות ללחץ",prev:6,now:4},
  {n:"קושי בהירדמות",prev:6,now:6},
  {n:"ערפול מוחי",prev:6,now:6}
];

var cs=[false,false,false];
function tc(i){cs[i]=!cs[i];document.getElementById('cb'+i).className='cbox'+(cs[i]?' on':'');var a=document.getElementById('cbAll');if(a)a.className='cbox'+((cs[0]&&cs[1]&&cs[2])?' on':'');document.getElementById('cbtn').disabled=!(cs[0]&&cs[2]);}
function checkAllJ(){var all=cs[0]&&cs[1]&&cs[2];for(var i=0;i<3;i++){cs[i]=!all;document.getElementById('cb'+i).className='cbox'+(!all?' on':'');}var a=document.getElementById('cbAll');if(a)a.className='cbox'+(!all?' on':'');document.getElementById('cbtn').disabled=!(cs[0]&&cs[2]);}
function pick(el){[].forEach.call(el.parentNode.children,function(c){c.classList.remove('sel')});el.classList.add('sel');}
function tg(el,rf){el.classList.toggle('sel');if(rf){document.getElementById('rfNote').style.display=el.classList.contains('sel')?'block':'none';}}

function render(){
  var c=document.getElementById('content');c.innerHTML='';
  SCREENS.forEach(function(s){var tmp=document.createElement('div');tmp.innerHTML=V[s.id]();while(tmp.firstChild){c.appendChild(tmp.firstChild);}});
  buildJump();show(0,true);
}
function buildJump(){document.getElementById('jump').innerHTML=SCREENS.map(function(s,i){return '<div class="j" data-j="'+i+'" onclick="go('+i+')">'+(i+1)+'. '+s.label+'</div>';}).join('');}
function show(n){
  document.querySelectorAll('.scr').forEach(function(el){var i=+el.getAttribute('data-i');el.classList.remove('active','exit');if(i===n)el.classList.add('active');else if(i<n)el.classList.add('exit');});
  cur=n;updateChrome();
  var v=document.getElementById('scanvid');
  if(v){if(SCREENS[n].id==='scan'){v.currentTime=0;v.play().catch(function(){});}else{try{v.pause();}catch(e){}}}
}
function updateChrome(){
  var s=SCREENS[cur],prog=document.getElementById('prog'),fill=document.getElementById('fill');
  if(s.noprog){prog.classList.add('hide');}else{prog.classList.remove('hide');fill.style.width=((cur)/(SCREENS.length-2)*100)+'%';}
  document.getElementById('sbar').className='statusbar'+(s.id==='scan'?' dark':'');
  [].forEach.call(document.querySelectorAll('.j'),function(j){j.classList.toggle('on',+j.getAttribute('data-j')===cur);});
}
function next(){if(cur<SCREENS.length-1)show(cur+1);}
function prev(){if(cur>0)show(cur-1);}
function go(n){show(n);}
document.addEventListener('keydown',function(e){if(/INPUT|TEXTAREA|SELECT/.test((e.target&&e.target.tagName)||''))return;if(e.key==='ArrowLeft')next();if(e.key==='ArrowRight')prev();});
render();
</script>
